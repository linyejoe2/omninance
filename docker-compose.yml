services:
  omnindicator:
    build: ./omnindicator
    container_name: omnindicator
    ports:
      - "${OMNINDICATOR_PORT}:8501"
    environment:
      - TZ=Asia/Taipei
    env_file:
      - .env
    volumes:
      - ./omnindicator/database:/app/database
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - omninance-network

  chip-tracker:
    build: ./omninance-chip-tracker
    container_name: chip-tracker
    ports:
      - "${CHIP_TRACKER_PORT}:8000"
    environment:
      - TZ=Asia/Taipei
    env_file:
      - .env
    volumes:
      - ./omninance-chip-tracker/data:/app/data
      - ./omninance-chip-tracker/dist:/app/dist
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - omninance-network

  omnitrader:
    build: ./omnitrader
    container_name: omnitrader
    ports:
      - "${OMNITRADER_PORT}:8000"
    environment:
      - TZ=Asia/Taipei
      - PYTHON_KEYRING_BACKEND=keyrings.cryptfile.cryptfile.CryptFileKeyring
      - KEYRING_CRYPTFILE_PASSWORD=${KEYRING_CRYPTFILE_PASSWORD}
      - SIGNALS_PATH=/app/signals/latest_signals.json
      - MATRIX_PATH=/app/matrix
    env_file:
      - .env
    volumes:
      - ./omnitrader/cert:/app/cert:ro
      - ./omninance-chip-tracker/dist:/app/signals:ro
      - ./omninance-chip-tracker/data/matrix:/app/matrix:ro
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - omninance-network

  omninance-dashboard:
    build: ./omninance-dashboard
    container_name: omninance-dashboard
    ports:
      - "${DASHBOARD_PORT}:80"
    depends_on:
      omnitrader:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - omninance-network

networks:
  omninance-network:
    driver: bridge
