services:
  app:
    build: .
    container_name: omninance-app
    ports:
      - "${APP_PORT}:8501"
    env_file:
      - .env
    volumes:
      - ./database:/app/database
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - omninance-network

networks:
  omninance-network:
    driver: bridge
