# ofelia.ini

# JOB 1: Triggers your data-sync API every hour
; [job-local "auto-attendance-record-creation"]
; schedule = @hourly
; command = sh -c 'wget --post-data=\"\" --header=\"x-cron-token: super_secret\" -O- http://backend:3000/api/attendance/create/now'
; no-overlap = true

# Hourly trigger — the endpoint itself only refreshes symbols whose
# updated_at is older than 12h, so data updates every half day.
[job-local "stock-list-refresh"]
schedule = @hourly
command = sh -c 'wget --post-data=\"\" -O- http://omninance-backend:8000/api/stock-list/refresh'
no-overlap = true

# Hourly trigger — TDCC publishes holder data weekly (dated Friday); the
# endpoint no-ops until new Friday data appears, then upserts it into MongoDB.
[job-local "holder-refresh"]
schedule = @hourly
command = sh -c 'wget --post-data=\"\" -O- http://omninance-backend:8000/api/holders/refresh'
no-overlap = true
