services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5436:5432"
    volumes:
      - ./db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - omninance-network
  omnindicator:
    build: ./omnindicator
    container_name: omnindicator
    ports:
      - "${OMNINDICATOR_PORT}:8501"
    environment:
      - TZ=Asia/Taipei
    env_file:
      - .env
    volumes:
      - ./database:/app/database
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - omninance-network

  chip-tracker:
    build: ./omninance-chip-tracker
    container_name: chip-tracker
    ports:
      - "${CHIP_TRACKER_PORT}:8000"
    environment:
      - TZ=Asia/Taipei
    env_file:
      - .env
    volumes:
      - ./omninance-chip-tracker/data:/app/data
      - ./omninance-chip-tracker/dist:/app/dist
      - ./database:/app/database:ro
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - omninance-network

  omnitrader:
    build: ./omnitrader
    container_name: omnitrader
    ports:
      - "${OMNITRADER_PORT}:8000"
    environment:
      - TZ=Asia/Taipei
      - PYTHON_KEYRING_BACKEND=keyrings.cryptfile.cryptfile.CryptFileKeyring
      - KEYRING_CRYPTFILE_PASSWORD=${KEYRING_CRYPTFILE_PASSWORD}
    env_file:
      - .env
    volumes:
      - ./omnitrader/cert:/app/cert:ro
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - omninance-network

  omninance-backend:
    build: ./omninance-backend
    container_name: omninance-backend
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - TZ=Asia/Taipei
      - OMNITRADER_URL=http://omnitrader:8000
      - CHIP_TRACKER_URL=http://chip-tracker:8000
    env_file:
      - .env
    volumes:
      - ./database:/app/database
    depends_on:
      omnitrader:
        condition: service_healthy
      chip-tracker:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - omninance-network

  omninance-dashboard:
    build: ./omninance-dashboard
    container_name: omninance-dashboard
    ports:
      - "${DASHBOARD_PORT}:80"
    depends_on:
      omnitrader:
        condition: service_healthy
      omninance-backend:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - omninance-network

networks:
  omninance-network:
    driver: bridge
